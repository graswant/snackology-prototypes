<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snack Wall - Lightbox Prototype</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@400;500;700&family=Luckiest+Guy&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--sn-plum:#531C56;--sn-crimson:#B91F48;--sn-lime:#D7DF28;--counter-dark:#1A1208;--receipt-paper:#F5F0E8;--receipt-ink:#1a1a1a;--receipt-faded:#666}
body{background:var(--sn-plum);font-family:"Space Grotesk",sans-serif;color:white;overflow-x:hidden}
.fake-section{padding:60px 40px;text-align:center;font-family:"Anton",sans-serif;font-size:clamp(28px,4vw,52px);letter-spacing:.04em;text-transform:uppercase;color:white;opacity:.35}
.snack-wall{background:var(--counter-dark);padding:70px 0 80px;position:relative;overflow:hidden}
.snack-wall::before{content:"";display:block;height:3vw;min-height:24px;max-height:56px;background:var(--counter-dark);clip-path:polygon(0 100%,100% 0,100% 100%);margin-top:calc(-3vw + 1px);position:absolute;top:0;left:0;right:0;z-index:2}
.sw-header{text-align:center;margin-bottom:40px;position:relative;z-index:3;padding:0 20px}
.sw-overline{font-size:12px;letter-spacing:.28em;text-transform:uppercase;font-weight:700;color:var(--sn-lime);margin-bottom:8px;display:block}
.sw-title{font-family:"Anton",sans-serif;font-size:clamp(44px,7vw,96px);font-weight:400;line-height:.92;letter-spacing:.03em;text-transform:uppercase;color:#fff;text-shadow:4px 4px 0 var(--sn-crimson)}
.sw-sub{margin-top:12px;font-size:14px;color:rgba(255,255,255,.5)}
.sw-outer{max-width:1000px;margin:0 auto;padding:0 24px;position:relative;z-index:3}
.thumb-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.thumb{aspect-ratio:3/4;border-radius:4px;cursor:pointer;position:relative;overflow:hidden;opacity:0;box-shadow:2px 4px 12px rgba(0,0,0,.5);transition:transform .2s ease}
.thumb:active{transform:scale(0.93)}
.thumb-bg{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:clamp(20px,5vw,34px)}
.thumb-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.8) 0%,transparent 55%);display:flex;flex-direction:column;justify-content:flex-end;padding:7px}
.thumb-event{font-size:clamp(5.5px,1.4vw,8.5px);font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:white;line-height:1.3}
.thumb-plus{position:absolute;top:5px;right:5px;background:rgba(255,255,255,.25);border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:white}
.sw-hint{text-align:center;margin-top:12px;font-size:11px;color:rgba(255,255,255,.3);letter-spacing:.1em;text-transform:uppercase}
.sw-cta{text-align:center;margin-top:36px;position:relative;z-index:3}
.insta-btn{display:inline-flex;align-items:center;gap:10px;background:transparent;color:var(--sn-lime);font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:13px;letter-spacing:.12em;text-transform:uppercase;padding:13px 26px;border-radius:4px;text-decoration:none;border:3px solid var(--sn-lime);box-shadow:4px 4px 0 var(--sn-lime);transition:background .2s,transform .2s}
.insta-btn:hover{background:var(--sn-lime);color:var(--sn-plum);transform:translate(-2px,-2px)}
.lightbox{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;pointer-events:none;transition:opacity .25s ease}
.lightbox.open{opacity:1;pointer-events:all}
.lb-backdrop{position:absolute;inset:0;background:rgba(10,5,20,.88);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.lb-close{position:fixed;top:14px;right:14px;z-index:1002;width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.15);backdrop-filter:blur(4px);border:2px solid rgba(255,255,255,.25);color:white;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.lb-card{position:relative;z-index:2;width:100%;max-width:320px;background:var(--receipt-paper);font-family:"Courier Prime",monospace;color:var(--receipt-ink);transform:scale(0.85) translateY(24px);transition:transform .3s cubic-bezier(.34,1.4,.64,1);box-shadow:0 24px 60px rgba(0,0,0,.7);clip-path:polygon(0% 1.5%,2% 0%,4% 1.5%,6% 0%,8% 1.5%,10% 0%,12% 1.5%,14% 0%,16% 1.5%,18% 0%,20% 1.5%,22% 0%,24% 1.5%,26% 0%,28% 1.5%,30% 0%,32% 1.5%,34% 0%,36% 1.5%,38% 0%,40% 1.5%,42% 0%,44% 1.5%,46% 0%,48% 1.5%,50% 0%,52% 1.5%,54% 0%,56% 1.5%,58% 0%,60% 1.5%,62% 0%,64% 1.5%,66% 0%,68% 1.5%,70% 0%,72% 1.5%,74% 0%,76% 1.5%,78% 0%,80% 1.5%,82% 0%,84% 1.5%,86% 0%,88% 1.5%,90% 0%,92% 1.5%,94% 0%,96% 1.5%,98% 0%,100% 1.5%,100% 98.5%,98% 100%,96% 98.5%,94% 100%,92% 98.5%,90% 100%,88% 98.5%,86% 100%,84% 98.5%,82% 100%,80% 98.5%,78% 100%,76% 98.5%,74% 100%,72% 98.5%,70% 100%,68% 98.5%,66% 100%,64% 98.5%,62% 100%,60% 98.5%,58% 100%,56% 98.5%,54% 100%,52% 98.5%,50% 100%,48% 98.5%,46% 100%,44% 98.5%,42% 100%,40% 98.5%,38% 100%,36% 98.5%,34% 100%,32% 98.5%,30% 100%,28% 98.5%,26% 100%,24% 98.5%,22% 100%,20% 98.5%,18% 100%,16% 98.5%,14% 100%,12% 98.5%,10% 100%,8% 98.5%,6% 100%,4% 98.5%,2% 100%,0% 98.5%)}
.lightbox.open .lb-card{transform:scale(1) translateY(0)}
.lb-inner{padding:20px 18px 24px}
.lb-brand{text-align:center;border-bottom:1px dashed #aaa;padding-bottom:10px;margin-bottom:10px}
.lb-brand-name{font-family:"Luckiest Guy",cursive;font-size:20px;letter-spacing:.1em;color:var(--sn-plum);display:block}
.lb-brand-tag{font-size:7.5px;letter-spacing:.15em;text-transform:uppercase;color:#999;display:block;margin-top:2px}
.lb-photo{width:100%;aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;font-size:64px;margin-bottom:12px}
.lb-event-name{font-size:12px;font-weight:700;color:var(--sn-plum);text-transform:uppercase;letter-spacing:.05em;border-top:1px dashed #ccc;padding-top:9px;margin-bottom:6px}
.lb-lines{font-size:10.5px;line-height:1.8}
.lb-line{display:flex;justify-content:space-between;color:var(--receipt-faded)}
.lb-line.bold{color:var(--receipt-ink);font-weight:700;font-size:11px}
.lb-quip{text-align:center;font-weight:700;font-size:10px;letter-spacing:.07em;text-transform:uppercase;color:var(--sn-plum);margin:10px 0 8px;border-top:1px dashed #bbb;border-bottom:1px dashed #bbb;padding:8px 4px;line-height:1.7}
.lb-barcode{margin-top:10px;text-align:center}
.lb-barcode-num{font-size:8px;letter-spacing:.1em;color:#bbb;margin-top:3px}
.lb-counter{text-align:center;margin-top:8px;font-size:9px;letter-spacing:.12em;color:#bbb;text-transform:uppercase}
.lb-nav{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:12px;z-index:1002}
.lb-nav-btn{width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,.15);backdrop-filter:blur(4px);border:2px solid rgba(255,255,255,.25);color:white;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s,border-color .2s}
.lb-nav-btn:hover,.lb-nav-btn:active{background:var(--sn-lime);color:var(--sn-plum);border-color:var(--sn-lime)}
@keyframes thumbIn{from{opacity:0;transform:scale(0.82) translateY(14px)}to{opacity:1;transform:scale(1) translateY(0)}}
.thumb.visible{animation:thumbIn .4s cubic-bezier(.34,1.4,.64,1) forwards}
</style>
</head>
<body>
<div class="fake-section" style="background:#F498AD;color:#531C56;">Brand Story Section</div>
<section class="snack-wall">
  <div class="sw-header">
    <span class="sw-overline">Every Event. Every Snack. Every Memory.</span>
    <h2 class="sw-title">The Snack Wall</h2>
    <p class="sw-sub">Tap any receipt to open it</p>
  </div>
  <div class="sw-outer">
    <div class="thumb-grid" id="thumbGrid"></div>
    <p class="sw-hint">tap to open full receipt</p>
  </div>
  <div class="sw-cta"><a href="https://instagram.com" target="_blank" class="insta-btn">See more on Instagram</a></div>
</section>
<div class="fake-section" style="background:linear-gradient(135deg,#D35C74,#E6572E);">Waitlist Section</div>
<div class="lightbox" id="lightbox">
  <div class="lb-backdrop" id="lbBackdrop"></div>
  <button class="lb-close" id="lbClose">&#10005;</button>
  <div class="lb-card" id="lbCard"><div class="lb-inner" id="lbInner"></div></div>
  <div class="lb-nav">
    <button class="lb-nav-btn" id="lbPrev">&#8592;</button>
    <button class="lb-nav-btn" id="lbNext">&#8594;</button>
  </div>
</div>
<script>
const receipts=[
  {emoji:"🎉",bg:"#B91F48",event:"Mumbai Launch Party",quip:"ZERO LEFTOVERS.\nZERO REGRETS.",items:[{k:"Guests",v:"200+"},{k:"Snacks Consumed",v:"ALL OF THEM"},{k:"Vibe",v:"IMMACULATE"},{k:"Repeat?",v:"ALREADY BOOKED"}],total:"HAPPINESS: PRICELESS",code:"SN2024-MUM-001"},
  {emoji:"🌶",bg:"#F47642",event:"Spice Festival Delhi",quip:"TOO SPICY?\nNEVER HEARD OF IT.",items:[{k:"Heat Level",v:"VOLCANIC"},{k:"Tissues Used",v:"MANY"},{k:"Dairy Consumed",v:"LOTS"},{k:"Coming Back?",v:"100%"}],total:"SPICE RATING: FIRE x3",code:"SN2024-DEL-007"},
  {emoji:"🥳",bg:"#531C56",event:"Brand Pop-Up Pune",quip:"TABLE FOR ONE.\nSNACK FOR TWENTY.",items:[{k:"Samples Given",v:"500"},{k:"New Fans Made",v:"499"},{k:"That One Guy",v:"WRONG"},{k:"Tables Needed",v:"JUST ONE"}],total:"NET SCORE: PERFECT",code:"SN2024-PUN-012"},
  {emoji:"🏆",bg:"#145293",event:"Award Night Mumbai",quip:"BEST SNACK BRAND.\nOBVIOUSLY.",items:[{k:"Trophies",v:"1 (SO FAR)"},{k:"Humble?",v:"WORKING ON IT"},{k:"Speech",v:"TOO LONG"},{k:"Snacks At Podium",v:"YES"}],total:"STATUS: LEGENDARY",code:"SN2024-AWD-003"},
  {emoji:"🎶",bg:"#5BBA47",event:"Music Night Bengaluru",quip:"MUSIC + SNACKS =\nLIFE COMPLETE.",items:[{k:"Songs Played",v:"32"},{k:"Packs Sold",v:"800"},{k:"Crowd Size",v:"PACKED"},{k:"Encore?",v:"YES PLS"}],total:"GOOD TIMES: PRICELESS",code:"SN2024-BLR-019"},
  {emoji:"🍕",bg:"#D7DF28",event:"Office Snack Day",quip:"PRODUCTIVITY UP.\nSNACKS: GONE.",items:[{k:"Boxes Ordered",v:"12"},{k:"Gone By Noon",v:"ALL 12"},{k:"Complaints",v:"ZERO"},{k:"Regrets",v:"ZERO"}],total:"ROI: DELICIOUS",code:"SN2024-OFF-044"},
  {emoji:"🎪",bg:"#A5C63E",event:"Street Food Carnival",quip:"STOOD IN QUEUE.\nWAS WORTH IT.",items:[{k:"Queue Length",v:"50 PEOPLE"},{k:"Wait Time",v:"20 MINS"},{k:"Worth It?",v:"ABSOLUTELY"},{k:"Complaints",v:"ZERO"}],total:"SATISFACTION: MAX",code:"SN2024-CAR-028"},
  {emoji:"🌟",bg:"#D35C74",event:"Influencer Collab Day",quip:"NOT PAID TO SAY THIS.\nOK MAYBE A LITTLE.",items:[{k:"Reels Created",v:"60"},{k:"Views",v:"2M+"},{k:"Snacks Eaten",v:"ON CAMERA"},{k:"Paid?",v:"...YES"}],total:"CLOUT: ACHIEVED",code:"SN2024-INF-055"}
];
const grid=document.getElementById("thumbGrid"),lb=document.getElementById("lightbox"),lbInner=document.getElementById("lbInner"),lbCard=document.getElementById("lbCard");
let current=0;
receipts.forEach((r,i)=>{
  const t=document.createElement("div");t.className="thumb";
  t.innerHTML='<div class="thumb-bg" style="background:'+r.bg+';">'+r.emoji+'<div class="thumb-overlay"><div class="thumb-event">'+r.event+'</div></div><div class="thumb-plus">+</div></div>';
  t.addEventListener("click",()=>openLightbox(i));grid.appendChild(t);
});
const thumbs=document.querySelectorAll(".thumb");
new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting){thumbs.forEach((t,i)=>setTimeout(()=>t.classList.add("visible"),i*55));}});},{threshold:0.2}).observe(document.querySelector(".snack-wall"));
function makeBars(i){return Array.from({length:34},(_,j)=>{const x=(2+j*2.8).toFixed(1),h=(13+Math.sin(j*1.9+i*0.7)*5).toFixed(1),y=((24-parseFloat(h))/2).toFixed(1),w=j%6===0?2.2:j%3===0?1.5:1;return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="#333"/>';}).join("");}
function renderCard(i){const r=receipts[i];lbInner.innerHTML='<div class="lb-brand"><span class="lb-brand-name">SNACKOLOGY</span><span class="lb-brand-tag">Snack First. Ask Questions Never.</span></div><div class="lb-photo" style="background:'+r.bg+';">'+r.emoji+'</div><div class="lb-event-name">'+r.event+'</div><div class="lb-lines">'+r.items.map(it=>'<div class="lb-line"><span>'+it.k+'</span><span>'+it.v+'</span></div>').join("")+'</div><div class="lb-quip">'+r.quip.split("\n").join("<br>")+'</div><div class="lb-lines"><div class="lb-line bold"><span>'+r.total+'</span></div></div><div class="lb-barcode"><svg width="100%" height="24" viewBox="0 0 100 24">'+makeBars(i)+'</svg><div class="lb-barcode-num">'+r.code+'</div></div><div class="lb-counter">'+(i+1)+' / '+receipts.length+'</div>';}
function openLightbox(i){current=i;renderCard(i);lb.classList.add("open");document.body.style.overflow="hidden";}
function closeLightbox(){lb.classList.remove("open");document.body.style.overflow="";}
function goNext(){current=(current+1)%receipts.length;lbCard.style.transform="scale(0.9) translateX(-40px)";setTimeout(()=>{renderCard(current);lbCard.style.transition="none";lbCard.style.transform="scale(0.9) translateX(40px)";requestAnimationFrame(()=>requestAnimationFrame(()=>{lbCard.style.transition="transform .3s cubic-bezier(.34,1.4,.64,1)";lbCard.style.transform="scale(1) translateX(0)";}));},110);}
function goPrev(){current=(current-1+receipts.length)%receipts.length;lbCard.style.transform="scale(0.9) translateX(40px)";setTimeout(()=>{renderCard(current);lbCard.style.transition="none";lbCard.style.transform="scale(0.9) translateX(-40px)";requestAnimationFrame(()=>requestAnimationFrame(()=>{lbCard.style.transition="transform .3s cubic-bezier(.34,1.4,.64,1)";lbCard.style.transform="scale(1) translateX(0)";}));},110);}
document.getElementById("lbClose").addEventListener("click",closeLightbox);
document.getElementById("lbBackdrop").addEventListener("click",closeLightbox);
document.getElementById("lbNext").addEventListener("click",goNext);
document.getElementById("lbPrev").addEventListener("click",goPrev);
let tx=0;
lb.addEventListener("touchstart",e=>{tx=e.touches[0].clientX;},{passive:true});
lb.addEventListener("touchend",e=>{const d=tx-e.changedTouches[0].clientX;if(Math.abs(d)>45){d>0?goNext():goPrev();}},{passive:true});
document.addEventListener("keydown",e=>{if(!lb.classList.contains("open"))return;if(e.key==="ArrowRight")goNext();if(e.key==="ArrowLeft")goPrev();if(e.key==="Escape")closeLightbox();});
</script>
</body>
</html>
