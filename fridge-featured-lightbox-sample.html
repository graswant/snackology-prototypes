<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Snack Wall – Featured Fridge + Lightbox</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@400;500;700&family=Permanent+Marker&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--sn-plum:#531C56;--sn-crimson:#B91F48;--sn-lime:#D7DF28;--sn-green:#5BBA47;--fridge-white:#EEF0F0;--fridge-edge:#C8CBCC;--shadow:rgba(0,0,0,.28)}
body{background:var(--sn-plum);font-family:"Space Grotesk",sans-serif;color:white;overflow-x:hidden}
.fake-section{padding:60px 40px;text-align:center;font-family:"Anton",sans-serif;font-size:clamp(28px,4vw,52px);letter-spacing:.04em;text-transform:uppercase;color:white;opacity:.35}
.fridge-section{background:linear-gradient(160deg,#2a0a2e 0%,#1a0820 100%);padding:70px 0 80px;position:relative;overflow:hidden}
.fridge-section::before{content:"";display:block;height:3vw;min-height:24px;max-height:56px;background:linear-gradient(160deg,#2a0a2e 0%,#1a0820 100%);clip-path:polygon(0 100%,100% 0,100% 100%);margin-top:calc(-3vw + 1px);position:absolute;top:0;left:0;right:0;z-index:2}
.fs-header{text-align:center;margin-bottom:44px;position:relative;z-index:3;padding:0 20px}
.fs-overline{font-size:12px;letter-spacing:.28em;text-transform:uppercase;font-weight:700;color:var(--sn-lime);margin-bottom:8px;display:block}
.fs-title{font-family:"Anton",sans-serif;font-size:clamp(44px,7vw,96px);font-weight:400;line-height:.92;letter-spacing:.03em;text-transform:uppercase;color:#fff;text-shadow:4px 4px 0 var(--sn-crimson)}
.fs-sub{margin-top:12px;font-size:14px;color:rgba(255,255,255,.55)}
.fridge-outer{max-width:700px;margin:0 auto;padding:0 20px;position:relative;z-index:3}
.fridge-body{background:linear-gradient(135deg,var(--fridge-white) 0%,#D8DBDC 50%,#CACECF 100%);border-radius:18px;border:5px solid var(--fridge-edge);box-shadow:inset -4px -4px 12px rgba(0,0,0,.12),inset 4px 4px 12px rgba(255,255,255,.7),0 20px 60px rgba(0,0,0,.5),0 4px 16px rgba(0,0,0,.3);position:relative;height:540px;overflow:visible}
.fridge-body::after{content:"";position:absolute;inset:0;border-radius:13px;background:repeating-linear-gradient(180deg,transparent 0,transparent 3px,rgba(255,255,255,.06) 3px,rgba(255,255,255,.06) 4px);pointer-events:none}
@media(max-width:500px){.fridge-body{height:430px}}
.fridge-handle{position:absolute;right:-18px;top:50%;transform:translateY(-50%);width:12px;height:120px;background:linear-gradient(90deg,#b0b3b5,#e0e3e4,#b0b3b5);border-radius:6px;box-shadow:2px 2px 8px rgba(0,0,0,.3)}
.magnet{position:absolute;cursor:pointer;transition:transform .2s cubic-bezier(.34,1.56,.64,1),box-shadow .2s ease;transform-origin:center center;opacity:0;will-change:transform}
.magnet:hover{z-index:100!important}.magnet:active{transform:scale(1.08)!important}
.magnet-photo{width:112px;background:#fff;padding:8px 8px 28px;box-shadow:3px 5px 18px var(--shadow),1px 1px 0 rgba(0,0,0,.08)}
.magnet-photo .photo-img{width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:40px;overflow:hidden}
.magnet-photo .photo-caption{font-family:"Permanent Marker",cursive;font-size:9px;color:#333;text-align:center;margin-top:6px;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.magnet-photo::before{content:"";position:absolute;top:-6px;left:50%;transform:translateX(-50%);width:12px;height:12px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#e05555,#8b1a1a);box-shadow:0 2px 4px rgba(0,0,0,.4);z-index:5}
.magnet-round{width:54px;height:54px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:2px 4px 12px var(--shadow),inset 0 1px 0 rgba(255,255,255,.3);border:2px solid rgba(255,255,255,.2)}
.magnet-rect{padding:8px 12px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:"Anton",sans-serif;font-size:11px;letter-spacing:.08em;text-transform:uppercase;box-shadow:2px 4px 12px var(--shadow),inset 0 1px 0 rgba(255,255,255,.2);border:2px solid rgba(255,255,255,.15);white-space:nowrap}
.magnet-note{width:92px;background:#FEFB9E;padding:10px 8px 12px;box-shadow:3px 5px 18px var(--shadow);font-family:"Permanent Marker",cursive;font-size:10px;color:#333;line-height:1.5;text-align:center}
.magnet-note::before{content:"";position:absolute;top:-6px;left:50%;transform:translateX(-50%);width:12px;height:12px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#4fc3f7,#0277bd);box-shadow:0 2px 4px rgba(0,0,0,.4);z-index:5}
.magnet-seeall{width:102px;height:102px;border-radius:50%;display:flex;align-items:center;justify-content:center;text-align:center;padding:14px;background:radial-gradient(circle at 35% 35%,#f9f25a,var(--sn-lime));color:var(--sn-plum);font-family:"Anton",sans-serif;font-size:16px;line-height:1.05;letter-spacing:.04em;text-transform:uppercase;box-shadow:4px 8px 22px rgba(0,0,0,.35),inset 0 2px 0 rgba(255,255,255,.5);border:3px solid rgba(255,255,255,.35)}
.magnet-seeall span{display:block;font-size:12px;margin-top:6px;letter-spacing:.08em}
@media(max-width:500px){.magnet-photo{width:82px;padding:6px 6px 22px}.magnet-photo .photo-img{font-size:30px}.magnet-photo .photo-caption{font-size:7.5px}.magnet-round{width:42px;height:42px;font-size:18px}.magnet-rect{font-size:9px;padding:6px 9px}.magnet-note{width:72px;font-size:8.5px}.magnet-seeall{width:82px;height:82px;font-size:13px}.magnet-seeall span{font-size:10px}}
@keyframes magnetDrop{0%{opacity:0;transform:var(--base-transform) translateY(-60px) scale(.7)}65%{transform:var(--base-transform) translateY(5px) scale(1.04)}82%{transform:var(--base-transform) translateY(-2px) scale(.98)}100%{opacity:1;transform:var(--base-transform)}}
.magnet.dropped{animation:magnetDrop .55s cubic-bezier(.22,1.2,.36,1) forwards}
.fs-cta{text-align:center;margin-top:36px;position:relative;z-index:3}.insta-btn{display:inline-flex;align-items:center;gap:10px;background:transparent;color:var(--sn-lime);font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:13px;letter-spacing:.12em;text-transform:uppercase;padding:13px 26px;border-radius:4px;text-decoration:none;border:3px solid var(--sn-lime);box-shadow:4px 4px 0 var(--sn-lime);transition:background .2s,transform .2s}.insta-btn:hover{background:var(--sn-lime);color:var(--sn-plum);transform:translate(-2px,-2px)}
.lightbox{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;pointer-events:none;transition:opacity .25s ease}.lightbox.open{opacity:1;pointer-events:all}.lb-backdrop{position:absolute;inset:0;background:rgba(10,5,20,.88);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}.lb-close{position:fixed;top:14px;right:14px;z-index:1002;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.15);backdrop-filter:blur(4px);border:2px solid rgba(255,255,255,.25);color:white;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.lb-card{position:relative;z-index:2;width:100%;max-width:360px;background:#fff;font-family:"Space Grotesk",sans-serif;color:#222;transform:scale(.88) translateY(24px);transition:transform .3s cubic-bezier(.34,1.4,.64,1);box-shadow:0 24px 60px rgba(0,0,0,.7);border-radius:16px;overflow:hidden}.lightbox.open .lb-card{transform:scale(1) translateY(0)}
.lb-photo{width:100%;aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;font-size:96px}.lb-content{padding:18px 18px 20px}.lb-topline{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:8px}.lb-title{font-family:"Anton",sans-serif;font-size:34px;line-height:.95;text-transform:uppercase;color:var(--sn-plum);margin-bottom:8px}.lb-city{font-size:14px;font-weight:700;color:var(--sn-crimson);margin-bottom:10px}.lb-copy{font-size:14px;line-height:1.6;color:#444}.lb-counter{margin-top:14px;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#999}.lb-nav{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:12px;z-index:1002}.lb-nav-btn{width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,.15);backdrop-filter:blur(4px);border:2px solid rgba(255,255,255,.25);color:white;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s,border-color .2s}.lb-nav-btn:hover,.lb-nav-btn:active{background:var(--sn-lime);color:var(--sn-plum);border-color:var(--sn-lime)}
</style>
</head>
<body>
<div class="fake-section" style="background:#F498AD;color:#531C56;">Brand Story Section</div>
<section class="fridge-section">
  <div class="fs-header">
    <span class="fs-overline">Featured Moments + Full Archive</span>
    <h2 class="fs-title">The Snack Wall</h2>
    <p class="fs-sub">Best moments on the fridge. Full event gallery one tap away.</p>
  </div>
  <div class="fridge-outer">
    <div class="fridge-body" id="fridgeBody"><div class="fridge-handle"></div></div>
  </div>
  <div class="fs-cta"><a href="https://instagram.com" target="_blank" class="insta-btn">See more on Instagram</a></div>
</section>
<div class="fake-section" style="background:linear-gradient(135deg,#D35C74,#E6572E);">Waitlist Section</div>
<div class="lightbox" id="lightbox">
  <div class="lb-backdrop" id="lbBackdrop"></div>
  <button class="lb-close" id="lbClose">&#10005;</button>
  <div class="lb-card" id="lbCard"><div class="lb-photo" id="lbPhoto"></div><div class="lb-content"><div class="lb-topline">Snackology Event</div><div class="lb-title" id="lbTitle"></div><div class="lb-city" id="lbCity"></div><div class="lb-copy" id="lbCopy"></div><div class="lb-counter" id="lbCounter"></div></div></div>
  <div class="lb-nav"><button class="lb-nav-btn" id="lbPrev">&#8592;</button><button class="lb-nav-btn" id="lbNext">&#8594;</button></div>
</div>
<script>
const allPhotos=[
  {emoji:"🎉",title:"Launch Party",city:"Mumbai",bg:"#f7e0e6",copy:"A loud first hello, packed tables, and snacks disappearing faster than we could restock."},
  {emoji:"🌶",title:"Spice Fest",city:"Delhi",bg:"#fdecd8",copy:"The crowd came for heat and stayed for the crunch. One of the strongest taste-reaction events."},
  {emoji:"🥳",title:"Pop-Up Booth",city:"Pune",bg:"#e8e0f0",copy:"High footfall, low leftovers, and nonstop sampling all afternoon."},
  {emoji:"🏆",title:"Award Night",city:"Mumbai",bg:"#ddeaf7",copy:"A polished evening where the brand looked premium but still playful and approachable."},
  {emoji:"🎶",title:"Music Night",city:"Bengaluru",bg:"#e0f0e4",copy:"A more energetic crowd, stronger impulse snacking, and highly shareable moments."},
  {emoji:"🌟",title:"Creator Collab",city:"Mumbai",bg:"#fce4ec",copy:"Great for social proof and lifestyle storytelling, not just product sampling."},
  {emoji:"🍿",title:"Cinema Tie-In",city:"Pune",bg:"#fff0db",copy:"Perfect setting for snack association: fun, familiar, and instantly understandable."},
  {emoji:"🎪",title:"Street Carnival",city:"Delhi",bg:"#eef8da",copy:"More colourful, crowded, and spontaneous than the premium indoor setups."},
  {emoji:"💼",title:"Office Day",city:"Gurgaon",bg:"#e5eef7",copy:"Useful because it shows everyday snacking, not only event glamour."},
  {emoji:"🚚",title:"Food Truck Pop-Up",city:"Bengaluru",bg:"#f9e8df",copy:"A good format for making the brand feel active, modern, and out in the city."},
  {emoji:"🏏",title:"Match Screening",city:"Mumbai",bg:"#e8f1df",copy:"Strong group-energy content. Great for community and repeat-consumption storytelling."},
  {emoji:"🛍️",title:"Retail Activation",city:"Delhi",bg:"#f6e5ef",copy:"Important because it connects the event world back to actual purchase behaviour."},
  {emoji:"🎁",title:"Festive Hamper Day",city:"Pune",bg:"#fff5db",copy:"Shows gifting, packaging, and shareability in a more premium context."},
  {emoji:"📸",title:"Media Preview",city:"Mumbai",bg:"#e4eef9",copy:"Small crowd, strong documentation, and useful polished assets for brand communication."},
  {emoji:"🌈",title:"Community Market",city:"Bengaluru",bg:"#f1e8fb",copy:"A softer, friendlier, more local-feeling event with strong visual variety."},
  {emoji:"🥂",title:"Evening Mixer",city:"Delhi",bg:"#fbe8e0",copy:"A grown-up atmosphere that helps the brand feel versatile beyond casual settings."},
  {emoji:"🚀",title:"Campus Drive",city:"Pune",bg:"#eef7df",copy:"Younger audience, high curiosity, and excellent trial potential."},
  {emoji:"🎨",title:"Art Fair",city:"Mumbai",bg:"#f4e6ef",copy:"Useful when you want the brand to feel culture-adjacent and visually expressive."}
];
const featured=[
  {kind:"photo",photo:0,zone:{x:[8,22],y:[4,20]},rot:[-9,-4]},
  {kind:"photo",photo:1,zone:{x:[58,74],y:[4,20]},rot:[3,8]},
  {kind:"photo",photo:2,zone:{x:[10,26],y:[43,60]},rot:[-10,-5]},
  {kind:"photo",photo:3,zone:{x:[58,76],y:[48,66]},rot:[4,9]},
  {kind:"photo",photo:4,zone:{x:[30,48],y:[57,75]},rot:[-5,2]},
  {kind:"photo",photo:5,zone:{x:[34,52],y:[10,24]},rot:[-3,4]},
  {kind:"round",emoji:"📍",bg:"#D7DF28",zone:{x:[74,86],y:[28,40]},rot:[-8,8]},
  {kind:"round",emoji:"🔥",bg:"#B91F48",zone:{x:[3,15],y:[71,84]},rot:[-8,8]},
  {kind:"rect",text:"SNACK FIRST",bg:"#531C56",color:"#D7DF28",zone:{x:[2,24],y:[28,39]},rot:[-4,2]},
  {kind:"rect",text:"10+ EVENTS",bg:"#B91F48",color:"#fff",zone:{x:[54,78],y:[27,38]},rot:[1,6]},
  {kind:"note",text:"Best moments\nlive here",zone:{x:[15,30],y:[75,89]},rot:[-6,0]},
  {kind:"seeall",text:"+12 more",zone:{x:[71,85],y:[72,86]},rot:[-4,4]}
];
const fridge=document.getElementById('fridgeBody');
const lb=document.getElementById('lightbox');
const lbPhoto=document.getElementById('lbPhoto');
const lbTitle=document.getElementById('lbTitle');
const lbCity=document.getElementById('lbCity');
const lbCopy=document.getElementById('lbCopy');
const lbCounter=document.getElementById('lbCounter');
let current=0;
function rand(min,max){return Math.random()*(max-min)+min}
function lighten(hex){let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);r=Math.min(255,r+60);g=Math.min(255,g+60);b=Math.min(255,b+60);return '#'+r.toString(16).padStart(2,'0')+g.toString(16).padStart(2,'0')+b.toString(16).padStart(2,'0')}
function renderLightbox(i){const p=allPhotos[i];lbPhoto.style.background=p.bg;lbPhoto.textContent=p.emoji;lbTitle.textContent=p.title;lbCity.textContent=p.city;lbCopy.textContent=p.copy;lbCounter.textContent=(i+1)+' / '+allPhotos.length}
function openLightbox(i){current=i;renderLightbox(i);lb.classList.add('open');document.body.style.overflow='hidden'}
function closeLightbox(){lb.classList.remove('open');document.body.style.overflow=''}
function goNext(){current=(current+1)%allPhotos.length;renderLightbox(current)}
function goPrev(){current=(current-1+allPhotos.length)%allPhotos.length;renderLightbox(current)}
document.getElementById('lbClose').addEventListener('click',closeLightbox);document.getElementById('lbBackdrop').addEventListener('click',closeLightbox);document.getElementById('lbNext').addEventListener('click',goNext);document.getElementById('lbPrev').addEventListener('click',goPrev);
let tx=0;lb.addEventListener('touchstart',e=>{tx=e.touches[0].clientX},{passive:true});lb.addEventListener('touchend',e=>{const d=tx-e.changedTouches[0].clientX;if(Math.abs(d)>45){d>0?goNext():goPrev()}},{passive:true});
document.addEventListener('keydown',e=>{if(!lb.classList.contains('open'))return;if(e.key==='ArrowRight')goNext();if(e.key==='ArrowLeft')goPrev();if(e.key==='Escape')closeLightbox()});
function createMagnet(item,index){const el=document.createElement('div');el.className='magnet';const left=rand(item.zone.x[0],item.zone.x[1]);const top=rand(item.zone.y[0],item.zone.y[1]);const rot=rand(item.rot[0],item.rot[1]);el.style.left=left+'%';el.style.top=top+'%';el.style.setProperty('--base-transform','rotate('+rot+'deg)');el.style.transform='rotate('+rot+'deg)';el.style.zIndex=10+index;
if(item.kind==='photo'){const p=allPhotos[item.photo];el.classList.add('magnet-photo');el.innerHTML='<div class="photo-img" style="background:'+p.bg+';">'+p.emoji+'</div><div class="photo-caption">'+p.city+' • '+p.title+'</div>';el.addEventListener('click',()=>openLightbox(item.photo));el.addEventListener('mouseenter',()=>{el.style.transform='rotate('+rot+'deg) scale(1.12) translateY(-6px)'});el.addEventListener('mouseleave',()=>{el.style.transform='rotate('+rot+'deg)'})}
if(item.kind==='round'){el.classList.add('magnet-round');el.style.background='radial-gradient(circle at 35% 35%,'+lighten(item.bg)+','+item.bg+')';el.textContent=item.emoji;el.addEventListener('mouseenter',()=>{el.style.transform='rotate('+rot+'deg) scale(1.15)'});el.addEventListener('mouseleave',()=>{el.style.transform='rotate('+rot+'deg)'})}
if(item.kind==='rect'){el.classList.add('magnet-rect');el.style.background=item.bg;el.style.color=item.color||'#fff';el.textContent=item.text;el.addEventListener('mouseenter',()=>{el.style.transform='rotate('+rot+'deg) scale(1.08)'});el.addEventListener('mouseleave',()=>{el.style.transform='rotate('+rot+'deg)'})}
if(item.kind==='note'){el.classList.add('magnet-note');el.innerHTML=item.text.replace('\n','<br>');el.addEventListener('mouseenter',()=>{el.style.transform='rotate('+rot+'deg) scale(1.08) translateY(-4px)'});el.addEventListener('mouseleave',()=>{el.style.transform='rotate('+rot+'deg)'})}
if(item.kind==='seeall'){el.classList.add('magnet-seeall');el.innerHTML='SEE ALL<span>'+item.text+'</span>';el.addEventListener('click',()=>openLightbox(0));el.addEventListener('mouseenter',()=>{el.style.transform='rotate('+rot+'deg) scale(1.08)'});el.addEventListener('mouseleave',()=>{el.style.transform='rotate('+rot+'deg)'})}
fridge.appendChild(el);return el}
let built=false;function build(){if(built)return;built=true;const els=featured.map((m,i)=>createMagnet(m,i));els.forEach((el,i)=>setTimeout(()=>el.classList.add('dropped'),i*80+100))}
new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting)build()})},{threshold:.15}).observe(fridge)
</script>
</body>
</html>
